<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GammaFlow NQ · 選擇權籌碼</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== 全域變數 (NQ 藍色主題) ===== */
        :root {
            --primary: #4A9EE0;
            --primary-light: #6BB5F0;
            --primary-dim: #2A5A80;
            --red: #E05252;
            --red-glow: #ff6b6b;
            --green: #3DBF8C;
            --green-glow: #5cdba3;
            --blue: #4A9EE0;
            --bg: #111318;
            --bg2: #181C23;
            --bg3: #1E232D;
            --bg4: #242A36;
            --border: rgba(74, 158, 224, 0.15);
            --border2: rgba(74, 158, 224, 0.3);
            --text: #F0ECE6;
            --text2: #ADA89A; 
            --text3: #6B655C;
            --purple: #b085f5;
            --amber: #d2991d;
            --orange: #f0883e;
            --yellow: #e3b341;
            --card-radius: 6px;
            --bar-height: 22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            padding-bottom: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 1.5px;
        }
        .header-sub { font-size: 12px; color: var(--text2); }
        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 6px 14px;
            cursor: pointer;
            color: var(--primary-light);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: background 0.15s;
        }
        .refresh-btn:hover { background: rgba(74, 158, 224, 0.08); }

        .section { padding: 20px; }
        .section-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text2);
            margin: 12px 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px;
        }
        .card h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text3);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .card .big {
            font-family: 'JetBrains Mono', monospace;
            font-size: 30px;
            font-weight: 700;
        }
        .card .sub { font-size: 13px; color: var(--text2); margin-top: 6px; }
        .red { color: var(--red); }
        .green { color: var(--green); }
        .blue { color: var(--blue); }
        .purple { color: var(--purple); }
        .nq-primary { color: var(--primary-light); }

        /* ===== 能量條 (NQ 風格) ===== */
        .energy-container { display: flex; flex-direction: column; gap: 6px; padding: 4px 0; }
        .energy-row {
            display: flex; align-items: stretch; height: 36px;
            background: rgba(255, 255, 255, 0.02); border-radius: var(--card-radius);
            border: 1px solid rgba(74, 158, 224, 0.06); transition: all 0.25s ease;
            position: relative; overflow: hidden; cursor: default;
        }
        .energy-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(74, 158, 224, 0.18);
            transform: scale(1.002);
        }
        .energy-row.is-zg {
            background: rgba(163, 113, 247, 0.10); border-color: rgba(163, 113, 247, 0.20);
            box-shadow: inset 0 0 30px rgba(163, 113, 247, 0.04);
        }
        .energy-row.is-maxc { background: rgba(224, 82, 82, 0.07); border-color: rgba(224, 82, 82, 0.18); }
        .energy-row.is-maxp { background: rgba(61, 191, 140, 0.07); border-color: rgba(61, 191, 140, 0.18); }

        .energy-left { flex: 1; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; min-width: 0; }
        .energy-left .bar-track {
            width: 100%; height: var(--bar-height); border-radius: 4px 0 0 4px;
            background: rgba(224, 82, 82, 0.08); position: relative; overflow: hidden; direction: rtl;
        }
        .energy-left .bar-fill {
            height: 100%; border-radius: 4px 0 0 4px;
            background: linear-gradient(90deg, #ff6b6b, #e05252, #b33a3a);
            box-shadow: 0 0 18px rgba(224, 82, 82, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; display: flex; align-items: center; justify-content: center;
            min-width: 28px; padding: 0 4px; direction: ltr;
        }
        .energy-right { flex: 1; display: flex; align-items: center; padding-left: 6px; min-width: 0; }
        .energy-right .bar-track {
            width: 100%; height: var(--bar-height); border-radius: 0 4px 4px 0;
            background: rgba(61, 191, 140, 0.08); position: relative; overflow: hidden;
        }
        .energy-right .bar-fill {
            height: 100%; border-radius: 0 4px 4px 0;
            background: linear-gradient(270deg, #5cdba3, #3DBF8C, #2a8f6a);
            box-shadow: 0 0 18px rgba(61, 191, 140, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative; display: flex; align-items: center; justify-content: center;
            min-width: 28px; padding: 0 4px;
        }
        .bar-value {
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.50); letter-spacing: 0.2px;
            white-space: nowrap; z-index: 2; opacity: 0.95; line-height: 1; padding: 0 2px;
        }
        .energy-center {
            flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 8px; min-width: 70px; position: relative; z-index: 3;
        }
        .energy-price {
            font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700;
            color: var(--primary-light);
            text-shadow: 0 0 20px rgba(74, 158, 224, 0.25);
            letter-spacing: 0.5px; line-height: 1.2; transition: all 0.2s;
        }
        .energy-tags { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-top: 1px; }
        .energy-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
            padding: 1px 6px; border-radius: 3px; letter-spacing: 0.3px;
            line-height: 1.4; background: rgba(255, 255, 255, 0.06); color: var(--text3);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .energy-tag.zg {
            background: rgba(163, 113, 247, 0.20); color: var(--purple);
            border-color: rgba(163, 113, 247, 0.20);
        }
        .energy-tag.maxc {
            background: rgba(224, 82, 82, 0.20); color: var(--red-glow);
            border-color: rgba(224, 82, 82, 0.20);
        }
        .energy-tag.maxp {
            background: rgba(61, 191, 140, 0.20); color: var(--green-glow);
            border-color: rgba(61, 191, 140, 0.20);
        }
        .energy-tag.big {
            background: rgba(210, 153, 29, 0.18); color: var(--amber);
            border-color: rgba(210, 153, 29, 0.18);
        }

        .energy-empty { text-align: center; padding: 30px 0; color: var(--text3); font-size: 15px; }

        /* ===== 響應式 ===== */
        @media (max-width: 500px) {
            .energy-row { height: 30px; }
            .energy-center { min-width: 55px; padding: 0 4px; }
            .energy-price { font-size: 13px; }
            .bar-value { font-size: 8px; }
            .energy-left .bar-fill, .energy-right .bar-fill { min-width: 22px; }
            :root { --bar-height: 16px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>GammaFlow NQ</h1>
            <span class="header-sub" id="statusText">載入中...</span>
        </div>
        <button class="refresh-btn" onclick="loadData()">⟳ 更新</button>
    </div>

    <div class="section">
        <div class="section-title">📅 NQ 選擇權關鍵位</div>
        <div class="summary-grid">
            <div class="card"><h3>🔴 最大壓力</h3><div class="big red" id="nqResist">-</div><div class="sub" id="nqResistOI"></div></div>
            <div class="card"><h3>🟢 最大支撐</h3><div class="big green" id="nqSupport">-</div><div class="sub" id="nqSupportOI"></div></div>
            <div class="card"><h3>⚡ Zero Gamma</h3><div class="big purple" id="nqZG">-</div><div class="sub">多空分界</div></div>
            <div class="card"><h3>📈 NDX 參考</h3><div class="big nq-primary" id="nqNDX">-</div><div class="sub" id="nqVol"></div></div>
        </div>

        <div class="section-title">🔵 NQ 選擇權壓力表</div>
        <div class="energy-container" id="nqEnergyList"></div>

        <div class="card" style="margin-top:20px">
            <h3 style="color:var(--text3);">📋 NQ GAMMA 指標數據</h3>
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <input id="tvNqInput" readonly style="flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:10px; color:var(--text); font-size:13px; font-family:'JetBrains Mono',monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" placeholder="載入中...">
                <button onclick="copyTV()" style="background:transparent; border:1px solid var(--border2); border-radius:4px; padding:10px 16px; color:var(--primary-light); font-family:'JetBrains Mono',monospace; font-size:14px; cursor:pointer; white-space:nowrap;">📋 複製</button>
            </div>
        </div>

        <div class="update-time" id="updateTime" style="text-align:center; font-size:13px; color:var(--text3); padding:16px; margin-top:20px;">最後更新：載入中...</div>
    </div>

    <script>
        const SHEET_ID = "1oPHb8dhDBpoN623zU0zEpC7cuiFLCrzWmvlcZsfSYFM";
        let DATA = { sr: [] };

        function safeNum(s) { const n = parseFloat(String(s || 0).replace(/,/g, '')); return isNaN(n) ? 0 : n; }

        async function fetchSheet(name) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&_=${Date.now()}&r=${Math.random()}`;
                const r = await fetch(url);
                const t = await r.text();
                const j = JSON.parse(t.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
                const cols = j.table.cols || [];
                return (j.table.rows || []).map(row => {
                    const o = {};
                    cols.forEach((c, i) => { const cell = row.c && row.c[i]; o[c.label] = cell ? (cell.v !== null ? cell.v : '') : ''; });
                    return o;
                });
            } catch (e) { return []; }
        }

        function buildSummaryCard(dataRows) {
            if (!dataRows.length) return;
            const sorted = [...dataRows].sort((a, b) => safeNum(b['履約價']) - safeNum(a['履約價']));
            let topC = sorted.reduce((a, b) => safeNum(a['CallOI']) > safeNum(b['CallOI']) ? a : b);
            let topP = sorted.reduce((a, b) => safeNum(a['PutOI']) > safeNum(b['PutOI']) ? a : b);
            let zg = sorted.find(r => String(r['Zero Gamma'] || '').includes('分界'));
            
            document.getElementById('nqResist').textContent = safeNum(topC['履約價']).toLocaleString();
            document.getElementById('nqResistOI').textContent = `Call ${Math.round(safeNum(topC['CallOI'])/1000)}K 口`;
            document.getElementById('nqSupport').textContent = safeNum(topP['履約價']).toLocaleString();
            document.getElementById('nqSupportOI').textContent = `Put ${Math.round(safeNum(topP['PutOI'])/1000)}K 口`;
            const zgStrike = zg ? safeNum(zg['履約價']) : null;
            document.getElementById('nqZG').textContent = zgStrike ? zgStrike.toLocaleString() : '-';
            
            // NDX 現價 (從試算表可能沒有，先用 0)
            document.getElementById('nqNDX').textContent = '請參考指標';
            document.getElementById('nqVol').textContent = '^VXN 波動率參考';
        }

        function buildEnergyBars(dataRows) {
            const div = document.getElementById('nqEnergyList');
            if (!dataRows.length) {
                div.innerHTML = '<div class="energy-empty">📭 尚無資料</div>';
                return;
            }

            const sorted = [...dataRows].sort((a, b) => safeNum(b['履約價']) - safeNum(a['履約價']));
            const maxCallOI = Math.max(1, ...sorted.map(r => safeNum(r['CallOI'])));
            const maxPutOI = Math.max(1, ...sorted.map(r => safeNum(r['PutOI'])));
            const maxTotal = Math.max(1, maxCallOI + maxPutOI);

            let html = '';
            sorted.forEach((r, idx) => {
                const strike = safeNum(r['履約價']);
                const c = safeNum(r['CallOI']);
                const p = safeNum(r['PutOI']);
                const cPct = Math.max(3, (c / maxTotal) * 100);
                const pPct = Math.max(3, (p / maxTotal) * 100);

                const isZG = String(r['Zero Gamma'] || '').includes('分界');
                const isBig = String(r['大資金'] || '').includes('大資金');
                const isMaxC = (c === maxCallOI && c > 0);
                const isMaxP = (p === maxPutOI && p > 0);

                let rowClass = 'energy-row';
                if (isZG) rowClass += ' is-zg';
                if (isMaxC) rowClass += ' is-maxc';
                if (isMaxP) rowClass += ' is-maxp';

                let tags = '';
                if (isZG) tags += '<span class="energy-tag zg">ZG</span>';
                if (isBig) tags += '<span class="energy-tag big">大</span>';
                if (isMaxC && !isZG) tags += '<span class="energy-tag maxc">最強壓</span>';
                if (isMaxP && !isZG) tags += '<span class="energy-tag maxp">最強撐</span>';

                const cDisplay = c >= 1000 ? (c / 1000).toFixed(1) + 'K' : String(c);
                const pDisplay = p >= 1000 ? (p / 1000).toFixed(1) + 'K' : String(p);

                html += `
                    <div class="${rowClass}">
                        <div class="energy-left">
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${cPct}%;">
                                    ${c > 0 ? `<span class="bar-value">${cDisplay}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="energy-center">
                            <span class="energy-price">${strike.toLocaleString()}</span>
                            ${tags ? `<div class="energy-tags">${tags}</div>` : ''}
                        </div>
                        <div class="energy-right">
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${pPct}%;">
                                    ${p > 0 ? `<span class="bar-value">${pDisplay}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            div.innerHTML = html;
        }

        async function loadData() {
            const btn = document.querySelector('.refresh-btn');
            if (btn) btn.textContent = '⏳ 更新中...';
            document.getElementById('statusText').textContent = '更新中...';
            try {
                const srRows = await fetchSheet('NQ 合併');
                DATA.sr = srRows.filter(r => String(r['履約價'] || '').match(/^\d/));

                buildSummaryCard(DATA.sr);
                buildEnergyBars(DATA.sr);
                
                // 載入 TV 字串
                try {
                    const tvRes = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=NQ 合併&range=A2&_=${Date.now()}`);
                    document.getElementById('tvNqInput').value = (await tvRes.text()).replace(/"/g, '').trim();
                } catch (e) {}

                const now = new Date().toLocaleString('zh-TW', { hour12: false });
                document.getElementById('updateTime').textContent = `最後更新：${now}`;
                document.getElementById('statusText').textContent = '✅ 每日 07:00 自動更新';
            } catch (e) {
                document.getElementById('statusText').textContent = '❌ 更新失敗';
                console.error(e);
            } finally {
                if (btn) btn.textContent = '⟳ 更新';
            }
        }

        function copyTV() {
            const input = document.getElementById('tvNqInput');
            input.select();
            document.execCommand('copy');
            const btn = input.parentElement.querySelector('button');
            btn.textContent = '✅ 已複製';
            setTimeout(() => { btn.textContent = '📋 複製'; }, 1500);
        }

        loadData();
    </script>
</body>
</html>
