name: NQ 選擇權 GEX 每日爬蟲

on:
  schedule:
    # 每天台灣時間早上 7:00 (UTC 23:00)
    - cron: "0 23 * * *"
  workflow_dispatch:
  repository_dispatch:        # 讓 Apps Script 可以觸發
    types: [daily-run]
  

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 執行 NQ 爬蟲
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          BARCHART_USER: ${{ secrets.BARCHART_USER }}
          BARCHART_PASS: ${{ secrets.BARCHART_PASS }}
        run: python nq_crawler.py
